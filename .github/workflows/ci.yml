name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.13.18, 3.8.4]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Check that workflows are up to date
        run: sbt '++ ${{ matrix.scala }}; githubWorkflowCheck'

      - name: Build project
        run: sbt '++ ${{ matrix.scala }}; test'

      - name: Compress target directories
        run: tar cf targets.tar target/out/jvm/scala-2.13.18/tests target/out/jvm/scala-2.13.18/scalafix-named-params-root target/out/jvm/scala-2.13.18/scalafix-named-params target/out/jvm/scala-2.13.18/output target/out/jvm/scala-2.13.18/input project/target

      - name: Upload target directories
        uses: actions/upload-artifact@v7
        with:
          name: target-${{ matrix.os }}-${{ matrix.scala }}-${{ matrix.java }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v'))
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.13.18]
        java: [temurin@17]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download target directories (2.13.18)
        uses: actions/download-artifact@v8
        with:
          name: target-${{ matrix.os }}-2.13.18-${{ matrix.java }}

      - name: Inflate target directories (2.13.18)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Download target directories (3.8.4)
        uses: actions/download-artifact@v8
        with:
          name: target-${{ matrix.os }}-3.8.4-${{ matrix.java }}

      - name: Inflate target directories (3.8.4)
        run: |
          tar xf targets.tar
          rm targets.tar

      - env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: sbt ci-release
